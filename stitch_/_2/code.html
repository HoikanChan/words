<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#f7f1d9",
              "on-tertiary-fixed-variant": "#1f5100",
              "error": "#ba1a1a",
              "secondary-fixed-dim": "#6be026",
              "on-tertiary-container": "#3f9600",
              "surface-container-high": "#eee8d1",
              "on-secondary-container": "#2d7100",
              "on-surface-variant": "#4c4546",
              "on-error": "#ffffff",
              "surface-container-low": "#faf4dc",
              "on-secondary-fixed": "#082100",
              "surface-dim": "#e0dac3",
              "on-surface": "#1e1c0e",
              "secondary-fixed": "#87fe45",
              "secondary-container": "#84fb42",
              "inverse-surface": "#333121",
              "on-background": "#1e1c0e",
              "surface": "#fff9e6",
              "tertiary-fixed-dim": "#6be026",
              "on-primary-fixed-variant": "#474747",
              "primary-fixed": "#e2e2e2",
              "on-error-container": "#93000a",
              "tertiary-container": "#082100",
              "on-primary-container": "#848484",
              "background": "#fff9e6",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#c6c6c6",
              "secondary": "#2b6c00",
              "inverse-primary": "#c6c6c6",
              "surface-variant": "#e8e3cb",
              "on-primary-fixed": "#1b1b1b",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#1f5100",
              "primary-container": "#1b1b1b",
              "primary": "#000000",
              "tertiary-fixed": "#87fe45",
              "on-tertiary-fixed": "#082100",
              "surface-tint": "#5e5e5e",
              "outline-variant": "#cfc4c5",
              "surface-bright": "#fff9e6",
              "tertiary": "#000000",
              "surface-container": "#f4eed6",
              "on-tertiary": "#ffffff",
              "outline": "#7e7576",
              "on-primary": "#ffffff",
              "on-secondary": "#ffffff",
              "surface-container-highest": "#e8e3cb"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bamboo-segment {
            background: linear-gradient(90deg, #2b6c00 0%, #4caf50 50%, #2b6c00 100%);
            height: 8px;
            border-radius: 4px;
            position: relative;
        }
        .bamboo-segment::after {
            content: '';
            position: absolute;
            right: 20%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(0,0,0,0.2);
        }
        .ink-shadow {
            box-shadow: 0 20px 40px rgba(30, 28, 14, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFF9E6] dark:bg-black/90 border-b-2 border-black/5 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#2B6C00]" data-icon="potted_plant">potted_plant</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-2xl font-black text-black dark:text-white">Panda Judge</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-['Plus_Jakarta_Sans'] font-bold text-black/60 dark:text-white/60 text-sm">Level 12</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border-2 border-primary/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Small circular user profile avatar with a minimalist aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfVLzJEB6o06F9iimVj1E8m894sX-1Gc_tkvzH_3E5T2v1OINm6d3oj-lmO2mUEsScLw04O5WwjoOCGDdk2yE_2Jdzbd4RxIcy77lt1PRPCuwlSjPrux56fJAomC_k2l6Urq0JV7-5CVc86FD2sVi9DrrlDC0ESfic7A9N5u7puH8r9oP0mEfVnLAOc90Dr9_z2Je_LeU7QTH2z2Ly1yIrvywnAa9LgPSPZRvDr53__L-uU70VX-LwGw_PpZg2NZSxtostQmJQe0Wk"/>
</div>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-center max-w-2xl mx-auto w-full">
<!-- Progress Bar (Bamboo Segment) -->
<div class="w-full mb-12">
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-bold font-headline uppercase tracking-widest text-primary/40">Challenge Progress</span>
<span class="text-xs font-bold font-headline text-secondary">14 / 20</span>
</div>
<div class="w-full bg-surface-container-highest rounded-full h-3 flex items-center p-1">
<div class="w-[70%] bamboo-segment"></div>
</div>
</div>
<!-- Word Card Area -->
<div class="flex-grow flex flex-col items-center justify-center w-full text-center py-12">
<div class="relative mb-4 group cursor-pointer active:scale-95 transition-transform duration-200">
<h2 class="font-headline text-6xl md:text-8xl font-extrabold tracking-tighter text-primary mb-2">
                    Ephemeral
                </h2>
<div class="flex items-center justify-center gap-3 text-on-surface-variant">
<span class="text-xl font-medium tracking-wide italic font-body">/əˈfēm(ə)rəl/</span>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-secondary hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
</div>
</div>
<!-- Hint Button -->
<button class="mt-8 px-8 py-3 bg-[#FAF4DC] border-2 border-primary font-headline font-bold text-sm tracking-widest uppercase hover:bg-primary hover:text-white transition-all duration-300 ink-shadow">
                Show Hint
            </button>
</div>
<!-- Interaction Area (Feedback Buttons) -->
<section class="w-full grid gap-4 mt-auto grid-cols-3">
<!-- Forgot Button -->
<button class="group flex flex-col items-center justify-center p-6 bg-red-50 text-red-700 rounded-xl transition-all duration-200 active:scale-95 border-2 border-red-100 hover:bg-red-100 min-h-[160px]">
<div class="mb-3 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl" data-icon="heart_broken">heart_broken</span>
</div>
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-lg tracking-tight">Forgot</span>
<span class="font-body text-sm font-medium opacity-80">忘记</span>
</div>
</button>
<!-- Vague Button -->
<button class="group flex flex-col items-center justify-center p-6 bg-amber-50 text-amber-800 rounded-xl transition-all duration-200 active:scale-95 border-2 border-amber-100 hover:bg-amber-100 min-h-[160px]">
<div class="mb-3 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl" data-icon="question_mark">question_mark</span>
</div>
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-lg tracking-tight">Vague</span>
<span class="font-body text-sm font-medium opacity-80">模糊</span>
</div>
</button>
<!-- Mastered Button -->
<button class="group flex flex-col items-center justify-center p-6 bg-emerald-50 text-emerald-700 rounded-xl transition-all duration-200 active:scale-95 border-2 border-emerald-100 hover:bg-emerald-100 min-h-[160px]">
<div class="mb-3 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl" data-icon="check_circle">check_circle</span>
</div>
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-lg tracking-tight">Mastered</span>
<span class="font-body text-sm font-medium opacity-80">掌握</span>
</div>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pb-6 pt-3 px-4 bg-[#FFF9E6] dark:bg-black rounded-t-[2rem] border-t-2 border-black/5 shadow-[0_-10px_30px_rgba(30,28,14,0.08)]">
<a class="flex flex-col items-center justify-center bg-[#2B6C00] text-white rounded-xl px-5 py-2 scale-110" href="#">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-semibold">Study</span>
</a>
<a class="flex flex-col items-center justify-center text-black/40 dark:text-white/40 px-4 py-2 hover:text-black transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-semibold">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-black/40 dark:text-white/40 px-4 py-2 hover:text-black transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-semibold">Ranks</span>
</a>
<a class="flex flex-col items-center justify-center text-black/40 dark:text-white/40 px-4 py-2 hover:text-black transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] text-xs font-semibold">Profile</span>
</a>
</nav>
</body></html>
